<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <h1>Checkout</h1>

    <a href="cart.html">Back To Cart</a>
  </nav>

  <div class="checkout-container">

      <!-- DELIVERY FORM -->
      <div class="checkout-form">

          <h2>Delivery Details</h2>

          <input type="text"
                 id="name"
                 placeholder="Full Name">

          <input type="text"
                 id="address"
                 placeholder="Address">

          <input type="text"
                 id="phone"
                 placeholder="Phone Number">

          <input type="text"
                 id="pincode"
                 placeholder="Pincode">

          <h2>Payment Method</h2>

          <div class="payment-options">

              <label>
                  <input type="radio"
                         name="payment"
                         value="COD">

                  Cash On Delivery
              </label>

              <label>
                  <input type="radio"
                         name="payment"
                         value="UPI">

                  UPI
              </label>

              <label>
                  <input type="radio"
                         name="payment"
                         value="Card">

                  Card
              </label>

          </div>

          <!-- UPI SECTION -->
          <div id="upiSection" class="payment-section">

              <input type="text"
                     id="upiId"
                     placeholder="Enter UPI ID">

          </div>

          <!-- CARD SECTION -->
          <div id="cardSection" class="payment-section">

              <input type="text"
                     id="cardNumber"
                     placeholder="Card Number">

              <input type="text"
                     id="cardName"
                     placeholder="Card Holder Name">

              <input type="text"
                     id="expiry"
                     placeholder="Expiry Date">

              <input type="text"
                     id="cvv"
                     placeholder="CVV">

          </div>

      </div>

      <!-- ORDER SUMMARY -->
      <div class="order-summary">

          <h2>Order Summary</h2>

          <div id="summaryItems"></div>

          <h3 id="itemsTotal"></h3>

          <h3 id="shipping"></h3>

          <h2 id="grandTotal"></h2>

          <button onclick="placeOrder()">
              Place Order
          </button>

      </div>

  </div>

  <script src="checkout.js"></script>

</body>
</html>
