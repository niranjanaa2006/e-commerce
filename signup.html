<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Signup</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">

      <div class="auth-box">

          <h1>Signup ✨</h1>

          <input type="text"
                 id="signupName"
                 placeholder="Enter Name">

          <input type="email"
                 id="signupEmail"
                 placeholder="Enter Email">

          <input type="password"
                 id="signupPassword"
                 placeholder="Enter Password">

          <button onclick="signup()">
              Signup
          </button>

          <p>
              Already have an account?

              <a href="login.html">
                  Login
              </a>
          </p>

      </div>

  </div>

  <script src="auth.js"></script>

</body>
</html>
